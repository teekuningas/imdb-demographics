<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Curated Spectacle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-overlay" class="overlay">
        <div class="loader">
            <h2 id="loading-status" data-i18n="loading.init"></h2>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <p id="loading-details" class="details" data-i18n="loading.prepare"></p>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <h2 data-i18n="sidebar.heading"></h2>

            <div class="filter-group">
                <label for="search-input" data-i18n="filter.title"></label>
                <input type="search" id="search-input" data-i18n-ph="filter.title.ph">
            </div>

            <div class="filter-group year-group">
                <div>
                    <label for="year-from" data-i18n="filter.yearFrom"></label>
                    <input type="number" id="year-from" value="1894">
                </div>
                <div>
                    <label for="year-to" data-i18n="filter.yearTo"></label>
                    <input type="number" id="year-to">
                </div>
            </div>

            <div class="filter-group">
                <label data-i18n="filter.ageGroup"></label>
                <div id="age-group-container" class="checkbox-grid">
                    <label><input type="checkbox" name="age-group" value="0age"> <span data-i18n="filter.ageGroup.u18"></span></label>
                    <label><input type="checkbox" name="age-group" value="18age"> <span data-i18n="filter.ageGroup.18"></span></label>
                    <label><input type="checkbox" name="age-group" value="30age"> <span data-i18n="filter.ageGroup.30"></span></label>
                    <label><input type="checkbox" name="age-group" value="45age"> <span data-i18n="filter.ageGroup.45"></span></label>
                </div>
            </div>

            <div class="filter-group">
                <label data-i18n="filter.genres"></label>
                <div id="genres-container" class="checkbox-grid"></div>
            </div>

            <div id="extra-filters-area">
                <div id="extra-filter-director" class="filter-group hidden">
                    <label for="filter-director" data-i18n="filter.director"></label>
                    <input type="text" id="filter-director" data-i18n-ph="filter.director.ph">
                </div>
                <div id="extra-filter-country" class="filter-group hidden">
                    <label for="filter-country" data-i18n="filter.country"></label>
                    <input type="text" id="filter-country" data-i18n-ph="filter.country.ph">
                </div>
                <div id="extra-filter-language" class="filter-group hidden">
                    <label for="filter-language" data-i18n="filter.language"></label>
                    <input type="text" id="filter-language" data-i18n-ph="filter.language.ph">
                </div>
            </div>

            <div class="filter-actions">
                <button id="apply-filters" class="btn-primary" type="button" data-i18n="btn.apply"></button>
                <button id="reset-filters" class="btn-secondary" type="button" data-i18n="btn.reset"></button>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-titles">
                    <h1 data-i18n="app.title"></h1>
                    <p data-i18n="app.subtitle"></p>
                </div>
                <div class="header-actions">
                    <span id="results-count" class="results-count" aria-live="polite"></span>
                    <button id="lang-toggle" class="btn-icon" type="button" title="Change language">EN</button>
                    <button id="settings-btn" class="btn-icon" type="button">⚙️ <span data-i18n="settings.title"></span></button>
                </div>
            </header>

            <div class="table-container">
                <table id="movies-table">
                    <thead>
                        <tr>
                            <th scope="col" data-i18n="col.rank"></th>
                            <th scope="col" data-sort="title" class="sortable"><span data-i18n="col.title"></span> <span class="sort-icon"></span></th>
                            <th scope="col" data-sort="score" class="sortable"><span id="score-col-label" data-i18n="col.scoreBalanced"></span> <span class="sort-icon"></span></th>
                            <th scope="col" data-sort="female_avg" class="sortable"><span data-i18n="col.femaleAvg"></span> <span class="sort-icon"></span></th>
                            <th scope="col" data-sort="male_avg" class="sortable"><span data-i18n="col.maleAvg"></span> <span class="sort-icon"></span></th>
                            <th scope="col" data-sort="gaze_delta" class="sortable"><span data-i18n="col.gazeDelta"></span> <span class="sort-icon"></span></th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>

            <div class="pagination">
                <button id="prev-page" class="btn-secondary" type="button" disabled data-i18n="page.prev"></button>
                <span id="page-info"></span>
                <button id="next-page" class="btn-secondary" type="button" disabled data-i18n="page.next"></button>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 data-i18n="settings.title"></h2>

            <div class="settings-section">
                <h3 data-i18n="settings.genderBalance"></h3>
                <p class="settings-desc" data-i18n="settings.genderBalance.desc"></p>
                <label class="toggle-label">
                    <input type="checkbox" id="balanced-genders" checked>
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                    <span data-i18n="settings.balancedGenders"></span>
                </label>
            </div>

            <div class="settings-section">
                <h3 data-i18n="settings.display"></h3>
                <div class="settings-row">
                    <label for="gaze-threshold" data-i18n="settings.gazeDeltaThresh"></label>
                    <input type="number" id="gaze-threshold" step="0.1" value="0.5" min="0" max="10">
                </div>
                <div class="settings-row">
                    <label for="page-size" data-i18n="settings.rowsPerPage"></label>
                    <select id="page-size">
                        <option value="50">50</option>
                        <option value="100" selected>100</option>
                        <option value="200">200</option>
                        <option value="500">500</option>
                    </select>
                </div>
            </div>

            <div class="settings-section">
                <h3 data-i18n="settings.significance"></h3>
                <p class="settings-desc" data-i18n="settings.significance.desc"></p>
                <div class="settings-row">
                    <label for="min-votes" data-i18n="settings.minVotes"></label>
                    <input type="number" id="min-votes" value="1000" min="0" step="100">
                </div>
            </div>

            <div class="settings-section">
                <h3 data-i18n="settings.extraFilters"></h3>
                <p class="settings-desc" data-i18n="settings.extraFilters.desc"></p>
                <div class="column-toggles">
                    <label><input type="checkbox" class="extra-filter-toggle" value="director"> <span data-i18n="filter.director"></span></label>
                    <label><input type="checkbox" class="extra-filter-toggle" value="country"> <span data-i18n="filter.country"></span></label>
                    <label><input type="checkbox" class="extra-filter-toggle" value="language"> <span data-i18n="filter.language"></span></label>
                </div>
            </div>

            <div class="settings-section">
                <h3 data-i18n="settings.extraColumns"></h3>
                <p class="settings-desc" data-i18n="settings.extraColumns.desc"></p>
                <div class="column-toggles">
                    <label><input type="checkbox" class="col-toggle" value="imdb_score"> <span data-i18n="col.imdbScore"></span></label>
                    <label><input type="checkbox" class="col-toggle" value="total_votes"> <span data-i18n="col.totalVotes"></span></label>
                    <label><input type="checkbox" class="col-toggle" value="director"> <span data-i18n="col.director"></span></label>
                    <label><input type="checkbox" class="col-toggle" value="country"> <span data-i18n="col.country"></span></label>
                    <label><input type="checkbox" class="col-toggle" value="language"> <span data-i18n="col.language"></span></label>
                    <label><input type="checkbox" class="col-toggle" value="duration"> <span data-i18n="col.duration"></span></label>
                    <label><input type="checkbox" class="col-toggle" value="metascore"> <span data-i18n="col.metascore"></span></label>
                    <label><input type="checkbox" class="col-toggle" value="budget"> <span data-i18n="col.budget"></span></label>
                    <label><input type="checkbox" class="col-toggle" value="usa_gross"> <span data-i18n="col.usaGross"></span></label>
                    <label><input type="checkbox" class="col-toggle" value="worldwide_gross"> <span data-i18n="col.worldGross"></span></label>
                </div>
            </div>

            <button id="save-settings" class="btn-primary btn-full" type="button" data-i18n="settings.saveApply"></button>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="app.js?v=9"></script>
</body>
</html>
